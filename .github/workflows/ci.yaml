name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  cpp:
    name: C++ (build + test)
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/23andme/ldzip/ldzip-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tool versions (sanity)
        shell: bash
        run: |
          set -euo pipefail
          which plink2
          plink2 --version
          which Rscript
          Rscript --version

      - name: Build
        shell: bash
        working-directory: cpp
        run: make build

      - name: Set PLINK2 env var
        shell: bash
        run: echo "PLINK2=$(which plink2)" >> "$GITHUB_ENV"

      - name: Test
        shell: bash
        working-directory: cpp
        env:
          PLINK2: ${{ env.PLINK2 }}
        run: make test

  r:
    name: R (install + test)
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/23andme/ldzip/ldzip-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show R deps (sanity)
        shell: bash
        run: |
          set -euo pipefail
          Rscript --version
          Rscript -e "library(tinytest); library(Rcpp); library(DBI); library(RSQLite); cat('R deps OK\n')"

      - name: Build ldzip binary (needed for R tests)
        shell: bash
        working-directory: cpp
        run: make build

      - name: Install LDZipMatrix R package
        shell: bash
        working-directory: R
        run: make install

      - name: Run tinytests
        shell: bash
        working-directory: R
        run: make test
  
  nextflow:
    name: Nextflow (nf-test)
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/23andme/ldzip/ldzip-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity tool versions
        shell: bash
        run: |
          set -euo pipefail
          plink2 --version
          nextflow -version
          nf-test version || nf-test --help >/dev/null
          Rscript --version

      - name: Build ldzip (C++)
        shell: bash
        working-directory: cpp
        run: make build

      - name: Put ldzip on PATH
        shell: bash
        run: echo "${GITHUB_WORKSPACE}/cpp/bin" >> "$GITHUB_PATH"

      - name: Install LDZipMatrix (R package)
        shell: bash
        working-directory: R
        run: make install

      - name: Run pipeline tests (nf-test)
        shell: bash
        working-directory: pipelines/wholeGenomeLD
        run: |
          echo "===== BEFORE ====="
          id
          ls -ld .nf-test || true
          find .nf-test -maxdepth 2 -ls 2>/dev/null || true

          set +e
          make test
          status=$?

          echo "===== Exit status ====="
          echo "$status"

          echo "===== AFTER ====="
          ls -ld .nf-test || true
          find .nf-test -maxdepth 3 -ls 2>/dev/null || true

          echo "===== Running processes ====="
          ps -ef | grep -E '[j]ava|[n]extflow|[n]f-test|[d]ocker' || true

          echo "===== Open files in .nf-test ====="
          lsof +D .nf-test 2>/dev/null || true

          echo "===== Disk usage ====="
          du -sh .nf-test 2>/dev/null || true

          echo "===== Permissions ====="
          find .nf-test -printf "%M %u:%g %p\n" 2>/dev/null || true

          exit $status

      - name: Debug nf-test cleanup failure
        if: always()
        working-directory: pipelines/wholeGenomeLD
        run: |
          echo "Current user:"
          id

          echo "Directory ownership:"
          ls -ld .nf-test || true

          echo "Files owned by another user:"
          find .nf-test ! -user "$(id -u)" -ls 2>/dev/null | head -100 || true

          echo "Unusual permissions:"
          find .nf-test \( ! -readable -o ! -writable \) -ls 2>/dev/null | head -100 || true